<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IDS Operator Console{% endblock %}</title>
  <link rel="stylesheet" href="/static/console.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>IDS Operator Console</h1>
      <p>Alert triage and sensor health visibility</p>
    </div>
    {% if admin %}
    <nav class="topnav">
      <a href="/dashboard">Dashboard</a>
      <a href="/anomalies">Anomalies</a>
      <a href="/reports">Reports</a>
    </nav>
    <form method="post" action="/logout" class="logout-form">
      <input type="hidden" name="csrf_token" value="{{ admin.csrf_token }}">
      <button type="submit">Logout ({{ admin.username }})</button>
    </form>
    {% endif %}
  </header>

  <main class="layout">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <small>Generated at {{ generated_at }}</small>
  </footer>
  <script src="/static/console.js"></script>
</body>
</html>
